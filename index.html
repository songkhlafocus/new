<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>songkhlafocus</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- 🚀 SPEED HACK: สั่งเบราว์เซอร์ให้ต่อท่อ DNS และเตรียมช่องสัญญาณกับเซิร์ฟเวอร์ Google รอไว้ล่วงหน้า -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">

  <style>
    /* รีเซ็ตค่าพื้นฐานของ Browser */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* ป้องกันการ Scroll ที่ตัวหน้าเว็บหลัก (GitHub) */
      background-color: #ffffff;
    }

    /* จัดการ Iframe ให้เต็มจอ */
    #app-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* เพิ่ม Smooth Scrolling สำหรับ iOS */
      -webkit-overflow-scrolling: touch;
      display: none; /* ซ่อนไว้ก่อนโหลดเสร็จเพื่อไม่ให้เห็นหน้าจอขาวแวบขึ้นมา */
    }

    /* ตัว Loading ระหว่างรอ Iframe โหลด (เผื่อ Apps Script โหลดช้า) */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #d90429; /* เปลี่ยนสีไอคอนให้เข้าเซ็ตธีมหลักของสงขลาโฟกัส */
      border-radius: 50%;
      animation: spin 0.8s linear infinite; /* เร่งความเร็วการหมุนให้แอปดูตอบสนองไวขึ้น */
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    p {
      margin-top: 15px;
      font-family: sans-serif;
      color: #4a5568;
      font-size: 14px;
      font-weight: 500;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p>กำลังเปิดระบบจัดการข่าวสาร...</p>
  </div>

  <!-- นำ URL ดิบออกจากแท็ก src เพื่อไปประมวลผลคำนวณลิงก์ทะลุผ่าน JavaScript ด้านล่างแทน -->
  <iframe 
    id="app-frame" 
    allow="geolocation; microphone; camera; payment"
    onload="hideLoading()">
  </iframe>

  <script>
    // 🔗 ระบบส่งต่อ URL Parameter ทะลุผ่านเข้า Iframe อัตโนมัติ 🔗
    (function() {
      const baseAppsScriptUrl = "https://script.google.com/macros/s/AKfycbwhaGqCaY2VXKjsIhdgryROE3L1vVkSo1uXiMWvopEIIguL6E-a6wjG5C8SCdROGj-qUw/exec";
      
      // ดึงพารามิเตอร์ต่อท้ายจากลิงก์ที่พิมพ์มาบน GitHub Pages เช่น ?page=dashboard
      const currentQueryString = window.location.search;
      
      // ประกอบพารามิเตอร์เข้าด้วยกันแล้วฝังลงตัว Iframe
      const finalTargetUrl = baseAppsScriptUrl + currentQueryString;
      
      document.getElementById("app-frame").src = finalTargetUrl;
    })();

    // ฟังก์ชันซ่อนหน้าจอ Loading เมื่อ Iframe โหลดเสร็จเรียบร้อย
    function hideLoading() {
      const loader = document.getElementById('loading-screen');
      const frame = document.getElementById('app-frame');
      
      // แสดงผลบอร์ด iframe หลักออกมา
      frame.style.display = 'block';
      
      // เฟดหน้าจอโหลดสีขาวออกแบบนุ่มนวล
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 400);
    }

    // ป้องกันการลากเพื่อ Refresh (Pull-to-refresh) บนมือถือในบาง Browser
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  </script>

</body>
</html>
