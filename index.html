<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <title>songkhlafocus</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">

  <style>
    /* รีเซ็ตค่าพื้นฐานของ Browser */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* ป้องกันการ Scroll ที่ตัวหน้าเว็บหลัก (GitHub) */
      background-color: #ffffff;
    }

    /* จัดการ Iframe ให้เต็มจอ */
    #app-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* เพิ่ม Smooth Scrolling สำหรับ iOS */
      -webkit-overflow-scrolling: touch;
    }

    /* ตัว Loading ระหว่างรอ Iframe โหลด (เผื่อ Apps Script โหลดช้า) */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    p {
      margin-top: 15px;
      font-family: sans-serif;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="spinner"></div>
    <p>กำลังเปิดระบบ...</p>
  </div>

  <iframe 
    id="app-frame"
    src="https://script.google.com/macros/s/AKfycbwhaGqCaY2VXKjsIhdgryROE3L1vVkSo1uXiMWvopEIIguL6E-a6wjG5C8SCdROGj-qUw/exec" 
    allow="geolocation; microphone; camera; payment"
    onload="hideLoading()">
  </iframe>

  <script>
    // ฟังก์ชันซ่อนหน้าจอ Loading เมื่อ Iframe โหลดเสร็จ
    function hideLoading() {
      const loader = document.getElementById('loading-screen');
      loader.style.opacity = '0';
      setTimeout(() => {
        loader.style.display = 'none';
      }, 500);
    }

    // ป้องกันการลากเพื่อ Refresh (Pull-to-refresh) บนมือถือในบาง Browser
    document.addEventListener('touchmove', function(e) {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });
  </script>

</body>
</html>
